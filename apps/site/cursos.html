    .cursos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; margin-top: 28px; }
    .curso-card { background: var(--bg-card); border: 1.5px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: transform .15s, box-shadow .2s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }

    .curso-capa { height: 140px; background: linear-gradient(135deg, var(--teal-soft), var(--blue-soft)); display: grid; place-items: center; font-size: 3.5rem; }
    .curso-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .curso-body h3 { font-size: 1.1rem; }
    .curso-body p { color: var(--navy-muted); font-size: .88rem; line-height: 1.5; flex: 1; }
    .curso-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
    .curso-tag { font-size: .75rem; font-weight: 700; padding: 3px 10px; border-radius: 99px; background: var(--teal-soft); color: var(--teal-deep); }
    .curso-footer { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .curso-progress-bar { flex: 1; height: 8px; background: var(--line); border-radius: 99px; overflow: hidden; margin: 0 12px; }
    .curso-progress-bar span { display: block; height: 100%; background: var(--teal); border-radius: 99px; }
    .empty-state { text-align: center; padding: 60px 24px; color: var(--navy-muted); }

  <script>
  (function () {
    var API   = window.NST_API || 'https://api.noseutempo.app';
    var token = localStorage.getItem('nst.token');
    if (!token) { location.href = 'login.html'; return; }

    var ICONS = { personal_ia:'âœ¨', estudos:'ðŸ“–', produtividade:'âš¡', neurodiversidade:'ðŸ§ ', carreira:'ðŸŽ¯', dev_humano:'ðŸŒ±', idiomas:'ðŸ—£ï¸' };
    var LABELS = { basico:'Iniciante', intermediario:'IntermediÃ¡rio', avancado:'AvanÃ§ado' };

    fetch(API + '/api/courses', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(function(r){ return r.json(); })
      .then(function(courses) {
        courses = sortCoursesNewest(Array.isArray(courses) ? courses : []);
        var grid = document.getElementById('cursos-grid');
        if (!courses.length) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">ðŸ“š</div><h3>Nenhum curso disponÃ­vel ainda</h3><p>Os cursos criados no EstÃºdio aparecerÃ£o aqui.<br>Fale com o administrador para liberar conteÃºdo.</p></div>';
          return;
        }
        grid.innerHTML = courses.map(function(c) {
          var icon = c.capa ? '<img src="'+c.capa+'" style="width:100%;height:100%;object-fit:cover">' : (ICONS[c.category] || 'ðŸ“š');
          var prog = Math.round(Math.random() * 0); // TODO: progresso real por aluno
          return '<a class="curso-card" href="aula.html?course='+encodeURIComponent(c.id)+'&v=2">'
            + '<div class="curso-capa">' + icon + '</div>'
            + '<div class="curso-body">'
            +   '<h3>' + esc(c.titulo) + '</h3>'
            +   '<p>' + esc(c.descricao || '') + '</p>'
            +   '<div class="curso-meta">'
            +     (c.category ? '<span class="curso-tag">'+(ICONS[c.category]||'')+'&nbsp;'+(c.category)+'</span>' : '')
            +     (c.difficulty ? '<span class="curso-tag">'+LABELS[c.difficulty]+'</span>' : '')
            +     (c.totalMinutes ? '<span class="curso-tag">â±ï¸ '+c.totalMinutes+' min</span>' : '')
            +     (c.modulos ? '<span class="curso-tag">ðŸ“¦ '+c.modulos+' mÃ³dulos</span>' : '')
            +   '</div>'
            + '</div>'
            + '<div class="curso-footer">'
            +   '<span style="font-size:.8rem;font-weight:700;color:var(--navy-muted)">'+prog+'% concluÃ­do</span>'
            +   '<div class="curso-progress-bar"><span style="width:'+prog+'%"></span></div>'
            +   '<span class="btn btn--teal" style="font-size:.82rem;padding:6px 14px">Acessar â†’</span>'
            + '</div>'
            + '</a>';
        }).join('');
      })
      .catch(function(){ document.getElementById('cursos-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">ðŸ˜•</div><p>Erro ao carregar cursos. Tente novamente.</p></div>'; });

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
    function courseTime(c){
      var t = c && c.criado ? Date.parse(c.criado) : 0;
      return isNaN(t) ? 0 : t;
    }
    function sortCoursesNewest(courses){
      return courses.slice().sort(function(a,b){ return courseTime(b) - courseTime(a); });
    }
  })();
  </script>
