<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 170" role="img" aria-label="Planta e livros">
  <defs>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBD9C2"/><stop offset="100%" stop-color="#D9C0A0"/>
    </linearGradient>
  </defs>

  <!-- sombra -->
  <ellipse cx="100" cy="158" rx="78" ry="9" fill="#1B2B4A" opacity=".06"/>

  <!-- ── Livros empilhados ── -->
  <!-- livro azul (base) -->
  <rect x="84" y="128" width="98" height="22" rx="4" fill="#3E86CC"/>
  <rect x="84" y="128" width="98" height="7"  rx="4" fill="#5A9BDA"/>
  <rect x="90" y="135" width="4" height="9" rx="2" fill="#fff" opacity=".5"/>
  <!-- livro laranja (meio) -->
  <rect x="78" y="108" width="92" height="22" rx="4" fill="#F0902F"/>
  <rect x="78" y="108" width="92" height="7"  rx="4" fill="#F5A856"/>
  <rect x="84" y="115" width="4" height="9" rx="2" fill="#fff" opacity=".5"/>
  <!-- livro teal (topo) -->
  <rect x="88" y="90" width="80" height="20" rx="4" fill="#1F9AAB"/>
  <rect x="88" y="90" width="80" height="6"  rx="4" fill="#3FB4C4"/>
  <rect x="94" y="96" width="4" height="8" rx="2" fill="#fff" opacity=".5"/>

  <!-- ── Vaso ── -->
  <path d="M28 112 L72 112 L66 156 L34 156 Z" fill="url(#pot)"/>
  <rect x="24" y="104" width="52" height="12" rx="4" fill="#E4CFB2"/>
  <path d="M50 156 L50 116" stroke="#C9AE89" stroke-width="1.5" opacity=".5"/>

  <!-- ── Folhas ── -->
  <path d="M50 108 C44 84 30 74 26 58 C42 64 52 80 52 102 Z" fill="#3A8E55"/>
  <path d="M50 108 C56 80 72 70 78 54 C60 60 50 78 50 104 Z" fill="#4BA567"/>
  <path d="M50 106 C48 78 48 60 50 44 C54 60 54 82 52 106 Z" fill="#5DB877"/>
  <path d="M50 106 C40 92 28 90 20 82 C34 86 46 94 50 104 Z" fill="#2F7A47"/>
  <ellipse cx="50" cy="46" rx="5" ry="7" fill="#6BC586"/>
</svg>
