<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="NoSeuTempo">
  <defs>
    <linearGradient id="nstRing" x1="0.12" y1="0.05" x2="0.9" y2="0.98">
      <stop offset="0%"   stop-color="#3E86CC"/>
      <stop offset="42%"  stop-color="#2AA0AE"/>
      <stop offset="78%"  stop-color="#E89A3C"/>
      <stop offset="100%" stop-color="#F0902F"/>
    </linearGradient>
  </defs>

  <!-- Anel de progresso (relógio/meter) — gradiente azul → teal → laranja -->
  <circle cx="24" cy="24" r="18.5" fill="none" stroke="url(#nstRing)"
          stroke-width="6.4" stroke-linecap="round"
          stroke-dasharray="98 18" transform="rotate(132 24 24)"/>

  <!-- Ponta de seta (sensação de avanço/progresso) -->
  <path d="M37.5 12.8 l5.2 1.0 -2.0 4.9 z" fill="#F0902F"/>

  <!-- Ponteiros do relógio em "L" (12h + 3h) -->
  <path d="M24 24 L24 12.4" stroke="#234B86" stroke-width="5" stroke-linecap="round"/>
  <path d="M24 24 L32.8 24" stroke="#234B86" stroke-width="5" stroke-linecap="round"/>
  <circle cx="24" cy="24" r="3.1" fill="#234B86"/>
</svg>
