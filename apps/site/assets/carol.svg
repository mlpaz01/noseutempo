  <path d="M222 244 Q240 236 260 243" stroke="#1C0C06" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M280 243 Q300 236 318 244" stroke="#1C0C06" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="242" cy="266" rx="21" ry="16" fill="#FEFEFE"/>
  <ellipse cx="298" cy="266" rx="21" ry="16" fill="#FEFEFE"/>
  <circle cx="243" cy="268" r="12" fill="#3C2818"/>
  <circle cx="299" cy="268" r="12" fill="#3C2818"/>
  <circle cx="243" cy="268" r="7.5" fill="#0E0806"/>
  <circle cx="299" cy="268" r="7.5" fill="#0E0806"/>
  <circle cx="248" cy="263" r="4" fill="#fff" opacity=".92"/>
  <circle cx="304" cy="263" r="4" fill="#fff" opacity=".92"/>
  <!-- glasses -->
  <circle cx="242" cy="266" r="26" fill="none" stroke="#2C180C" stroke-width="3.5"/>
  <circle cx="298" cy="266" r="26" fill="none" stroke="#2C180C" stroke-width="3.5"/>
  <path d="M268 265 q2 -2 4 0" stroke="#2C180C" stroke-width="3.5" fill="none"/>
  <line x1="216" y1="258" x2="190" y2="250" stroke="#2C180C" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="324" y1="258" x2="350" y2="250" stroke="#2C180C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M260 302 Q270 310 280 302" stroke="#B06040" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".45"/>
  <!-- smile -->
  <path d="M248 322 Q270 344 292 322" stroke="#A04838" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M252 324 Q270 332 288 324 Q278 340 270 340 Q262 340 252 324 Z" fill="#fff" opacity=".55"/>
  <!-- blush -->
  <ellipse cx="212" cy="300" rx="24" ry="13" fill="#E08060" opacity=".16"/>
  <ellipse cx="328" cy="300" rx="24" ry="13" fill="#E08060" opacity=".16"/>

  <!-- ════════ LEFT ARM on desk ════════ -->
  <path d="M360 446 Q372 500 360 552 L300 552 Q288 510 300 458 Q330 446 360 446 Z" fill="url(#sweat)"/>
  <ellipse cx="320" cy="540" rx="52" ry="18" fill="url(#skin)"/>

  <!-- ════════ DESK ITEMS ════════ -->
  <!-- notebook -->
  <rect x="120" y="486" width="120" height="70" fill="#F6F0EA" rx="6" transform="rotate(-4 180 520)"/>
  <line x1="138" y1="506" x2="226" y2="500" stroke="#E6DED4" stroke-width="1.5"/>
  <line x1="139" y1="518" x2="227" y2="512" stroke="#E6DED4" stroke-width="1.5"/>
  <line x1="140" y1="530" x2="210" y2="525" stroke="#E6DED4" stroke-width="1.5"/>
  <!-- mug -->
  <rect x="392" y="470" width="54" height="62" fill="#23314F" rx="8"/>
  <path d="M446 486 Q468 486 468 502 Q468 518 446 518" stroke="#23314F" stroke-width="6" fill="none"/>
  <circle cx="419" cy="498" r="13" fill="none" stroke="#5FD0DF" stroke-width="2.5"/>
  <path d="M419 498 L419 491 M419 498 L424 501" stroke="#F0902F" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="419" cy="532" rx="27" ry="5" fill="#7A5430" opacity=".25"/>
</svg>
