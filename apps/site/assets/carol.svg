<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-label="Carol, mentora do NoSeuTempo — mulher sorridente, cabelos cacheados, óculos, com a mão no queixo">
  <title>Carol — Mentora NoSeuTempo</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2=".6" y2="1">
      <stop offset="0%" stop-color="#EAE0D2"/><stop offset="55%" stop-color="#E2D5C2"/><stop offset="100%" stop-color="#D8C8B0"/>
    </linearGradient>
    <radialGradient id="skin" cx="42%" cy="34%" r="64%">
      <stop offset="0%" stop-color="#D9A074"/><stop offset="72%" stop-color="#C88858"/><stop offset="100%" stop-color="#B57340"/>
    </radialGradient>
    <linearGradient id="sweat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8B98A"/><stop offset="100%" stop-color="#C29C68"/>
    </linearGradient>
    <radialGradient id="hair" cx="38%" cy="26%" r="56%">
      <stop offset="0%" stop-color="#3A2212"/><stop offset="100%" stop-color="#160A05"/>
    </radialGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C68C58"/><stop offset="100%" stop-color="#A8703F"/>
    </linearGradient>
  </defs>

  <rect width="520" height="560" fill="url(#bg)" rx="24"/>

  <!-- ambient blurred room -->
  <circle cx="430" cy="150" r="95" fill="#F2E4BC" opacity=".3"/>
  <rect x="28" y="150" width="120" height="10" fill="#9A7850" rx="2"/>
  <rect x="34" y="92" width="14" height="68" fill="#5A78C8" rx="2"/>
  <rect x="50" y="100" width="11" height="60" fill="#D04848" rx="2"/>
  <rect x="63" y="84" width="16" height="76" fill="#C8A428" rx="2"/>
  <rect x="81" y="96" width="12" height="64" fill="#38A870" rx="2"/>
  <rect x="95" y="88" width="15" height="72" fill="#7A48B8" rx="2"/>
  <rect x="112" y="98" width="12" height="62" fill="#D87030" rx="2"/>
  <rect x="126" y="90" width="13" height="70" fill="#4898C8" rx="2"/>
  <!-- plant -->
  <rect x="452" y="350" width="48" height="74" fill="#BE7448" rx="7"/>
  <ellipse cx="476" cy="350" rx="26" ry="7" fill="#A45C38"/>
  <ellipse cx="476" cy="306" rx="24" ry="44" fill="#3A8030" transform="rotate(-10 476 306)"/>
  <ellipse cx="492" cy="292" rx="19" ry="36" fill="#4A9040" transform="rotate(14 492 292)"/>
  <ellipse cx="460" cy="298" rx="18" ry="34" fill="#2A7025" transform="rotate(-22 460 298)"/>

  <!-- desk -->
  <rect x="0" y="436" width="520" height="124" fill="url(#desk)"/>
  <rect x="0" y="430" width="520" height="11" fill="#C88A56"/>
  <line x1="0" y1="468" x2="520" y2="466" stroke="#A06838" stroke-width="1" opacity=".25"/>

  <!-- ════════ BODY / SWEATER ════════ -->
  <path d="M150 560 C150 462 180 432 264 426 C348 432 384 462 384 560 Z" fill="url(#sweat)"/>
  <ellipse cx="170" cy="446" rx="64" ry="30" fill="#CCA876"/>
  <ellipse cx="360" cy="446" rx="64" ry="30" fill="#CCA876"/>
  <path d="M236 428 Q264 446 292 428 Q278 456 264 458 Q250 456 236 428 Z" fill="#BC966A"/>

  <!-- ════════ RIGHT ARM up to chin (hand-on-chin pose) ════════ -->
  <!-- forearm rising from desk to face -->
  <path d="M196 540 Q188 470 214 430 Q236 414 252 430 Q244 470 240 520 Q232 552 210 552 Z" fill="url(#sweat)"/>
  <!-- wrist + hand resting under chin -->
  <path d="M232 372 Q226 352 240 342 Q258 336 270 348 Q276 366 268 388 Q256 404 240 402 Q230 392 232 372 Z" fill="url(#skin)"/>
  <!-- fingers curving along cheek -->
  <path d="M244 348 Q252 330 262 320" stroke="#C07850" stroke-width="7" fill="none" stroke-linecap="round" opacity=".8"/>
  <path d="M254 352 Q263 336 272 326" stroke="#CC8C5E" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M262 358 Q272 344 280 334" stroke="#CC8C5E" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- neck -->
  <path d="M246 338 Q260 360 270 362 L276 392 Q264 404 252 400 Q244 384 244 360 Z" fill="url(#skin)"/>

