  <ellipse cx="270" cy="278" rx="88" ry="96" fill="url(#skin)"/>
  <ellipse cx="184" cy="282" rx="11" ry="16" fill="#C88058"/>
  <ellipse cx="356" cy="282" rx="11" ry="16" fill="#C88058"/>

