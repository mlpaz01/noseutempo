  <ellipse cx="270" cy="214" rx="104" ry="96" fill="url(#hair)"/>
  <ellipse cx="172" cy="246" rx="48" ry="86" fill="#160C06"/>
  <ellipse cx="368" cy="246" rx="48" ry="86" fill="#160C06"/>
  <ellipse cx="168" cy="306" rx="40" ry="58" fill="#1A1008"/>
  <ellipse cx="372" cy="306" rx="40" ry="58" fill="#1A1008"/>
  <circle cx="232" cy="170" r="36" fill="#1A1008"/>
  <circle cx="270" cy="156" r="42" fill="#1A1008"/>
  <circle cx="308" cy="170" r="36" fill="#1A1008"/>
  <circle cx="248" cy="146" r="26" fill="#180E06"/>
  <circle cx="294" cy="144" r="28" fill="#180E06"/>
  <!-- curl texture -->
  <circle cx="158" cy="212" r="18" fill="#2A1608" opacity=".7"/>
  <circle cx="150" cy="252" r="15" fill="#2A1608" opacity=".6"/>
  <circle cx="160" cy="300" r="13" fill="#2A1608" opacity=".55"/>
  <circle cx="382" cy="212" r="18" fill="#2A1608" opacity=".7"/>
  <circle cx="390" cy="252" r="15" fill="#2A1608" opacity=".6"/>
  <circle cx="380" cy="300" r="13" fill="#2A1608" opacity=".55"/>
  <ellipse cx="255" cy="182" rx="30" ry="12" fill="#3E2618" opacity=".45" transform="rotate(-12 255 182)"/>

